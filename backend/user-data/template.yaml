AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Traxent user-data stack — DynamoDB table + Lambda + HTTP API that persists per-user
  lesson/quiz progress, paper trades, and firm selections. Replaces browser localStorage
  so a user's progress and trade history follow them across devices.

  This is real infrastructure-as-code: `sam deploy` (or the deploy-infra GitHub Action)
  creates/updates everything below. It is a SEPARATE stack from the existing manually-
  deployed payment Lambdas, so it does not touch the Stripe/checkout endpoint.

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs22.x
    Architectures: [arm64]

Parameters:
  Auth0Issuer:
    Type: String
    Default: https://auth.traxent.io/
    Description: Auth0 token issuer (custom domain, trailing slash).
  Auth0Audience:
    Type: String
    Default: ilvfACgF2sCmLWaugCn11qTB04aTvWxz,YKvrjZoxnehdES7nmMs9SRXi3G0MdXcK
    Description: Comma-separated ID-token audiences to accept — web SPA Client ID and iOS native Client ID.
  AllowedOrigin:
    Type: String
    Default: https://traxent.io
    Description: CORS allowed origin for the API.

Resources:

  UserDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TraxentUserData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  UserDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-user-data
      Handler: index.handler
      CodeUri: functions/user-data/
      Environment:
        Variables:
          TABLE_NAME: !Ref UserDataTable
          AUTH0_ISSUER: !Ref Auth0Issuer
          AUTH0_AUDIENCE: !Ref Auth0Audience
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /user
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /user/{proxy+}
            Method: ANY

  # Account deletion (App Review 5.1.1(v)). Isolated from the data CRUD function
  # because it holds the powerful Stripe + Auth0-admin permissions. The specific
  # `DELETE /user/account` route takes precedence over the data function's greedy
  # ANY /user/{proxy+}.
  AccountDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-delete-account
      Handler: index.handler
      CodeUri: functions/delete-account/
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref UserDataTable
          AUTH0_ISSUER: !Ref Auth0Issuer
          AUTH0_AUDIENCE: !Ref Auth0Audience
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/traxent/*"
      Events:
        DeleteAccount:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /user/account
            Method: DELETE

  # Market news feed (Funded tier). A NEW function — created, permissioned and
  # routed entirely by this stack (it never existed before, which is why it
  # wasn't in the Lambda console). Reads the provider key from SSM; caches
  # in-memory for 30 min inside the function. Code stays at backend/functions/news-feed.
  NewsFeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-news-feed
      Handler: index.handler
      CodeUri: ../functions/news-feed/
      Timeout: 15
      Environment:
        Variables:
          AUTH0_AUDIENCE: !Ref Auth0Audience
      Policies:
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/traxent/news/*"
      Events:
        News:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /news
            Method: GET

  UserDataApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

Outputs:
  ApiBaseUrl:
    Description: Base URL for the user-data API. Put this in src/userdata.js (USERDATA_API).
    Value: !Sub "https://${UserDataApi}.execute-api.${AWS::Region}.amazonaws.com"
  NewsApiUrl:
    Description: News feed endpoint (Funded tier) = ApiBaseUrl + /news.
    Value: !Sub "https://${UserDataApi}.execute-api.${AWS::Region}.amazonaws.com/news"
  TableName:
    Value: !Ref UserDataTable
