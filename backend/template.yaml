AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Traxent backend

# This template mirrors the live `traxent-backend` CloudFormation stack 1:1, so a
# `sam deploy` reconciles it IN PLACE — same API id (da579ew81m), same URL, same
# function names, same routes. The ONLY difference from the deployed copy is that
# CodeUri points at the local function folders (so CI `sam build` can package and
# ship code), instead of the S3 artifact paths CloudFormation stored.
#
# Deployed by .github/workflows/deploy-payments.yml to stack `traxent-backend`.
# Logical IDs (TraxentApi, *Function) MUST stay as-is — they map to the live
# resources; renaming one would make CloudFormation delete + recreate it.

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30

Resources:
  TraxentApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: traxent-api
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,stripe-signature'"
        AllowOrigin: "'https://traxent.io'"

  CreateCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-create-checkout
      CodeUri: functions/create-checkout/
      Handler: index.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: traxent/*
      Events:
        Api:
          Type: Api
          Properties:
            Path: /checkout
            Method: post
            RestApiId: !Ref TraxentApi

  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-stripe-webhook
      CodeUri: functions/stripe-webhook/
      Handler: index.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: traxent/*
      Events:
        Api:
          Type: Api
          Properties:
            Path: /webhooks/stripe
            Method: post
            RestApiId: !Ref TraxentApi

  CancelSubscriptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-cancel-subscription
      CodeUri: functions/cancel-subscription/
      Handler: index.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: traxent/*
      Events:
        Api:
          Type: Api
          Properties:
            Path: /cancel
            Method: post
            RestApiId: !Ref TraxentApi

  # Upgrade/downgrade an existing subscription in place, with Stripe proration.
  # (create-checkout is only for first-time subscribers.) New route on the same API.
  ChangePlanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-change-plan
      CodeUri: functions/change-plan/
      Handler: index.handler
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: traxent/*
      Events:
        Api:
          Type: Api
          Properties:
            Path: /change-plan
            Method: post
            RestApiId: !Ref TraxentApi

Outputs:
  ApiUrl:
    Value: !Sub "https://${TraxentApi}.execute-api.eu-west-2.amazonaws.com/prod"
    Description: Traxent API endpoint
