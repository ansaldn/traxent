name: Deploy Payments (SAM)

# Infrastructure-as-code for the Stripe payment Lambdas + their REST API
# (checkout / cancel / webhook), defined in backend/template.yaml. Pushing a change
# to the template or any of the three functions runs `sam build` + `sam deploy`,
# which reconciles the `traxent-payments` stack.
#
# IMPORTANT: this stack must first ADOPT the existing live resources once — see
# backend/PAYMENTS-IMPORT-RUNBOOK.md. Until that one-time step is done, this workflow
# would try to CREATE new functions with the same names and fail ("already exists"),
# which is harmless but means nothing deploys. Do the runbook first, then this is
# fully automatic.

on:
  push:
    branches: [main]
    paths:
      - 'backend/template.yaml'
      - 'backend/functions/create-checkout/**'
      - 'backend/functions/cancel-subscription/**'
      - 'backend/functions/stripe-webhook/**'
      - '.github/workflows/deploy-payments.yml'
  workflow_dispatch: {}

# OIDC: assume the deploy role with a short-lived token (no static access keys).
permissions:
  id-token: write
  contents: read

jobs:
  deploy-payments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: SAM build
        working-directory: backend
        run: sam build

      - name: SAM deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name traxent-payments \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region eu-west-2

      - name: Show payment API URLs
        run: |
          aws cloudformation describe-stacks \
            --stack-name traxent-payments \
            --region eu-west-2 \
            --query "Stacks[0].Outputs" --output table
