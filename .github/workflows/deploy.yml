name: Deploy to S3

on:
  push:
    branches:
      - main
  # Allow other workflows (e.g. Scheduled Release) to trigger a deploy explicitly.
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Stamp build SHA into Service Worker and auth.js references
        run: |
          # Stamp the commit SHA into sw.js (cache name) AND into every
          # HTML <script src="auth.js?v=__BUILD_SHA__"> reference. Because the
          # HTML is served no-cache, each deploy points browsers at a fresh
          # auth.js URL — so a stale auth.js can never be reused, regardless
          # of the CloudFront 4h max-age on .js files.
          sed -i "s/__BUILD_SHA__/${GITHUB_SHA::8}/g" src/sw.js src/*.html
          echo "sw.js CACHE_NAME after stamping:"
          grep CACHE_NAME src/sw.js
          echo "auth.js references after stamping:"
          grep -h 'src="/\?auth.js' src/*.html | sort -u

      - name: Verify HTML integrity (guard against truncated files)
        run: |
          # OneDrive has silently truncated HTML file tails before (eating the
          # closing </script></body></html> and breaking inline scripts). Fail
          # the deploy loudly rather than ship a corrupted page.
          fail=0
          for f in src/*.html; do
            if ! tail -c 16 "$f" | tr -d '[:space:]' | grep -q '</html>'; then
              echo "::error file=$f::Truncated HTML — file does not end with </html>"
              fail=1
            fi
            open=$(grep -o '<script' "$f" | wc -l)
            close=$(grep -o '</script>' "$f" | wc -l)
            if [ "$open" -ne "$close" ]; then
              echo "::error file=$f::Unbalanced script tags ($open <script> vs $close </script>)"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "Deploy aborted: one or more HTML files look truncated/corrupted."
            exit 1
          fi
          echo "HTML integrity check passed — all pages end in </html> with balanced <script> tags."

      - name: Deploy to S3
        run: |
          # Pass 1: upload everything (and handle deletions) with a long,
          # immutable cache. Safe for content-stable assets like icons/logo.
          aws s3 sync src/ s3://traxent.io \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

          # Pass 2: re-upload the files that change every release with
          # `no-cache` so browsers always revalidate them. Without this, a
          # 24h browser cache kept serving a stale auth.js (old Auth0
          # `audience`) and the login page would not load until the cache
          # expired. CloudFront invalidation does NOT fix browser caches.
          aws s3 cp src/ s3://traxent.io --recursive \
            --exclude "*" \
            --include "*.html" \
            --include "auth.js" \
            --include "userdata.js" \
            --include "sw.js" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"