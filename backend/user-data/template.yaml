AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Traxent user-data stack — DynamoDB table + Lambda + HTTP API that persists per-user
  lesson/quiz progress, paper trades, and firm selections. Replaces browser localStorage
  so a user's progress and trade history follow them across devices.

  This is real infrastructure-as-code: `sam deploy` (or the deploy-infra GitHub Action)
  creates/updates everything below. It is a SEPARATE stack from the existing manually-
  deployed payment Lambdas, so it does not touch the Stripe/checkout endpoint.

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs22.x
    Architectures: [arm64]

Parameters:
  Auth0Issuer:
    Type: String
    Default: https://auth.traxent.io/
    Description: Auth0 token issuer (custom domain, trailing slash).
  Auth0Audience:
    Type: String
    Default: ilvfACgF2sCmLWaugCn11qTB04aTvWxz,YKvrjZoxnehdES7nmMs9SRXi3G0MdXcK
    Description: Comma-separated ID-token audiences to accept — web SPA Client ID and iOS native Client ID.
  AllowedOrigin:
    Type: String
    Default: https://traxent.io
    Description: CORS allowed origin for the API.

Resources:

  UserDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TraxentUserData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  UserDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-user-data
      Handler: index.handler
      CodeUri: functions/user-data/
      Environment:
        Variables:
          TABLE_NAME: !Ref UserDataTable
          AUTH0_ISSUER: !Ref Auth0Issuer
          AUTH0_AUDIENCE: !Ref Auth0Audience
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /user
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /user/{proxy+}
            Method: ANY

  # Account deletion (App Review 5.1.1(v)). Isolated from the data CRUD function
  # because it holds the powerful Stripe + Auth0-admin permissions. The specific
  # `DELETE /user/account` route takes precedence over the data function's greedy
  # ANY /user/{proxy+}.
  AccountDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-delete-account
      Handler: index.handler
      CodeUri: functions/delete-account/
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref UserDataTable
          AUTH0_ISSUER: !Ref Auth0Issuer
          AUTH0_AUDIENCE: !Ref Auth0Audience
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/traxent/*"
      Events:
        DeleteAccount:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /user/account
            Method: DELETE

  # Market news feed (Funded tier). A NEW function — created, permissioned and
  # routed entirely by this stack (it never existed before, which is why it
  # wasn't in the Lambda console). Reads the provider key from SSM; caches
  # in-memory for 30 min inside the function. Code stays at backend/functions/news-feed.
  NewsFeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: traxent-news-feed
      Handler: index.handler
      CodeUri: ../functions/news-feed/
      Timeout: 15
      Environment:
        Variables:
          AUTH0_AUDIENCE: !Ref Auth0Audience
      Policies:
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/traxent/news/*"
      Events:
        News:
          Type: HttpApi
          Properties:
            ApiId: !Ref UserDataApi
            Path: /news
            Method: GET

  UserDataApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # ── Edge protection: AWS WAF on the user-data HTTP API ────────────────────
  # RateLimitPerIP BLOCKS any single IP exceeding 2000 requests / 5 min (volumetric
  # abuse + enumeration). The AWS managed common rule set runs in COUNT mode first
  # (observe-only) so you can watch for false positives in CloudWatch before
  # switching its OverrideAction from `Count: {}` to `None: {}` to start blocking.
  # ~$5/mo + a few cents per million requests.
  ApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: traxent-userdata-acl
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: traxent-userdata-acl
      Rules:
        - Name: RateLimitPerIP
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitPerIP
        - Name: AWSCommonRules
          Priority: 1
          OverrideAction:
            Count: {}            # observe-only — change to `None: {}` to enforce
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSCommonRules

  ApiWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/apis/${UserDataApi}/stages/$default"
      WebACLArn: !GetAtt ApiWebAcl.Arn

  # ── Alerting: SNS topic + email. Confirm the subscription from your inbox ──
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: traxent-alerts

  AlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: davidansa00@gmail.com

  UserDataErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: traxent-user-data-errors
      AlarmDescription: user-data Lambda error spike (possible abuse or bug).
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref UserDataFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  DeleteAccountErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: traxent-delete-account-errors
      AlarmDescription: delete-account Lambda is failing — deletions may be stuck.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AccountDeleteFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  WafBlockedSpikeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: traxent-waf-blocked-spike
      AlarmDescription: WAF is blocking a lot of requests — possible attack in progress.
      Namespace: AWS/WAFV2
      MetricName: BlockedRequests
      Dimensions:
        - Name: WebACL
          Value: traxent-userdata-acl
        - Name: Region
          Value: !Ref AWS::Region
        - Name: Rule
          Value: ALL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  # ── Cost guardrail: email at 80% actual / 100% forecast of $50/mo ─────────
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: traxent-monthly
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 50
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
          Subscribers:
            - SubscriptionType: EMAIL
              Address: davidansa00@gmail.com
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
          Subscribers:
            - SubscriptionType: EMAIL
              Address: davidansa00@gmail.com

Outputs:
  ApiBaseUrl:
    Description: Base URL for the user-data API. Put this in src/userdata.js (USERDATA_API).
    Value: !Sub "https://${UserDataApi}.execute-api.${AWS::Region}.amazonaws.com"
  NewsApiUrl:
    Description: News feed endpoint (Funded tier) = ApiBaseUrl + /news.
    Value: !Sub "https://${UserDataApi}.execute-api.${AWS::Region}.amazonaws.com/news"
  TableName:
    Value: !Ref UserDataTable
