name: Deploy Payments (SAM)

# Infrastructure-as-code for the Stripe payment Lambdas + their REST API
# (checkout / cancel / webhook), defined in backend/template.yaml. On a push that
# touches the template or any of the three functions, this runs `sam build` +
# `sam deploy` to reconcile the **traxent-backend** stack — the stack that already
# owns these resources, so the API id (da579ew81m), URL and function names are
# unchanged.
#
# This reconciles the **traxent-backend** stack (which owns the live payment
# resources) on each relevant push — same API id (da579ew81m), URL and function
# names. The one-time adoption + change-set review is complete, so it now deploys
# automatically. Payment function CODE is managed here now, not in deploy-backend.yml.
on:
  push:
    branches: [main]
    paths:
      - 'backend/template.yaml'
      - 'backend/functions/create-checkout/**'
      - 'backend/functions/cancel-subscription/**'
      - 'backend/functions/stripe-webhook/**'
      - '.github/workflows/deploy-payments.yml'
  workflow_dispatch: {}

# OIDC: assume the deploy role with a short-lived token (no static access keys).
permissions:
  id-token: write
  contents: read

jobs:
  deploy-payments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python (for SAM CLI)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: SAM build
        working-directory: backend
        run: sam build

      - name: SAM deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name traxent-backend \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region eu-west-2

      - name: Show payment API URLs
        run: |
          aws cloudformation describe-stacks \
            --stack-name traxent-backend \
            --region eu-west-2 \
            --query "Stacks[0].Outputs" --output table
